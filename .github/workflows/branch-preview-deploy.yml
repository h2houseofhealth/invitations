name: Branch Preview Deploy (GitHub Pages)

on:
  push:
    branches:
      - dev
      - test
      - prd
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare branch folder
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          mkdir -p "dist/${BRANCH}"

          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            ./ "dist/${BRANCH}/"

          touch dist/.nojekyll
          echo "Branch deployed to /${BRANCH}"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          keep_files: true

      - name: Deployment summary
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/${GITHUB_REF_NAME}/"

          {
            echo "### Deployment complete"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- URL: ${URL}"
          } >> "$GITHUB_STEP_SUMMARY"
