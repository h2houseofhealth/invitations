<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Question Before Entry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="bg-music" src="music.mpeg" loop preload="auto" playsinline></audio>

  <div class="scene">
    <div class="light" aria-hidden="true"></div>
    <div class="wrapper">
      <div class="lid one"></div>
      <div class="lid two"></div>
      <div class="envelope"></div>
      <div class="seal" aria-hidden="true">
        <span class="seal-core"></span>
        <span class="seal-half left"></span>
        <span class="seal-half right"></span>
      </div>
      <div class="letter">
        <h1>WHAT AM I?</h1>
        <p class="riddle">
          You measure me in years,<br>
          But I am shaped in habits.<br><br>
          I decline in silence,<br>
          Or rise by design
        </p>
        <form class="answer-form" id="answer-form">
          <input id="riddle-answer" type="text" placeholder="Type your answer..." autocomplete="off">
          <button type="submit">Submit</button>
        </form>
        <div class="hint hidden" id="hint-words" aria-live="polite">
          <span class="hint-bottle" id="hint-bottle" role="button" tabindex="0" aria-label="Show hint pills">
            <span class="hint-bottle-cap"></span>
            <span class="hint-bottle-label">Hints</span>
          </span>
          <span class="hint-pills">
            <button class="hint-pill" type="button">age</button>
            <button class="hint-pill" type="button">health</button>
            <button class="hint-pill" type="button">time</button>
          </span>
        </div>
        <p class="result" id="result"></p>
      </div>
    </div>
    <button id="tap-open" class="tap-open" type="button">Tap to Open</button>
  </div>

  <section class="end-screen" id="end-screen" aria-hidden="true">
    <div class="cinematic-stage" id="cinematic-stage">
      <div class="quote-particle-field hidden" id="quote-particle-field" aria-hidden="true"></div>

      <div class="quote-layer" id="quote-layer" aria-live="polite">
        <p class="cinematic-quote" id="cinematic-quote"></p>
      </div>

      <div class="identity-panel hidden" id="identity-panel">
        <h2 class="identity-title">H2 HOUSE OF HEALTH</h2>

        <div class="lock-panel" id="lock-panel">
          <button class="lock-button" id="lock-button" type="button" aria-label="Reveal the experience">
            <span class="lock-icon" aria-hidden="true">🔒</span>
          </button>
          <p class="lock-copy">Reveal the experience</p>
        </div>

        <div class="key-panel hidden" id="key-panel" aria-live="polite">
          <div class="key-icon" aria-hidden="true">🗝️</div>
          <p class="key-status hidden" id="key-status">Your key has been accepted</p>
          <button class="enter-button hidden" id="enter-button" type="button">Enter</button>
        </div>
      </div>

      <div class="event-stage hidden" id="event-stage" aria-hidden="true">
        <div class="particle-field" id="event-particle-field" aria-hidden="true"></div>

        <article class="event-card">
          <!-- <div class="event-key" aria-hidden="true">🗝️</div>
          <p class="accepted-copy">Your key has been accepted.</p> -->

          <div class="details-grid">
            <div class="detail">
              <span class="label">Event</span>
              <span class="value">Grand Opening</span>
            </div>
            <div class="detail">
              <span class="label">Host</span>
              <span class="value">H2 House of Health</span>
            </div>
            <div class="detail">
              <span class="label">Date</span>
              <span class="value">19 March 2026</span>
            </div>
            <div class="detail">
              <span class="label">Location</span>
              <span class="value">Jubilee Hills</span>
            </div>
            <div class="detail">
              <span class="label">Time</span>
              <span class="value">11 am</span>
            </div>
          </div>
        </article>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
